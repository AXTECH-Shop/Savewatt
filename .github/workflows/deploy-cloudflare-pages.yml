name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 2cedd0140d5ca153a350adba5145e9fe
          command: pages project create savewatt --production-branch main
        continue-on-error: true

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 2cedd0140d5ca153a350adba5145e9fe
          command: pages deploy . --project-name savewatt --branch main --commit-hash ${{ github.sha }} --commit-message "${{ github.event.head_commit.message }}"